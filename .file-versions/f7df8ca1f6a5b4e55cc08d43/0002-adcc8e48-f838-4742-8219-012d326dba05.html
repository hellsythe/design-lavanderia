<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — LavanderPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #F0F4F8;
      --surface:      #FFFFFF;
      --surface-2:    #F8FAFC;
      --fg:           #1A2332;
      --muted:        #64748B;
      --border:       #E1E8F0;
      --accent:       #0F766E;
      --accent-soft:  #CCFBF1;
      --success:      #059669;
      --success-soft: #D1FAE5;
      --danger:       #DC2626;
      --danger-soft:  #FEE2E2;
      --radius:       10px;
      --shadow:       0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Public Sans', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .skip-link {
      position: absolute;
      top: -100%;
      left: 8px;
      z-index: 9999;
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 0 0 var(--radius) var(--radius);
      text-decoration: none;
      transition: top 0.12s;
    }
    .skip-link:focus { top: 0; }

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      padding: 32px 28px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 20px; height: 20px; }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .brand-tag {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .input-field {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface-2);
      color: var(--fg);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .input-field::placeholder { color: var(--muted); opacity: 0.7; }
    .input-field:hover { border-color: #CBD5E1; }
    .input-field:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(15,118,110,.12);
    }
    .input-field.error { border-color: var(--danger); background: var(--danger-soft); }
    .input-field.error:focus { box-shadow: 0 0 0 3px rgba(220,38,38,.12); }

    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      border-radius: 6px;
      transition: background 0.12s, color 0.12s;
    }
    .password-toggle:hover { background: var(--bg); color: var(--fg); }
    .password-toggle svg { width: 16px; height: 16px; }
    .password-wrap .input-field { padding-right: 42px; }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12.5px;
    }
    .remember-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .remember-wrap input {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .text-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.12s;
    }
    .text-link:hover { opacity: 0.8; text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.12s, transform 0.12s, box-shadow 0.12s;
    }
    .btn-primary:hover { background: #0F766E; box-shadow: var(--shadow-hover); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    .alert.show { display: flex; }
    .alert-error { background: var(--danger-soft); color: var(--danger); }
    .alert-success { background: var(--success-soft); color: var(--success); }
    .alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    .auth-footer {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }
    .input-field:focus-visible { outline-offset: 0; }
    .password-toggle:focus-visible { outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; }
      .auth-title { font-size: 20px; }
    }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Ir al contenido principal</a>

<div class="auth-page" id="main">
  <div class="auth-card" data-od-id="login-card">
    <div class="auth-logo" data-od-id="auth-logo">
      <div class="brand-icon">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M10 2C10 2 4 8.5 4 12.5a6 6 0 0012 0C16 8.5 10 2 10 2z"/>
          <path d="M7.5 13a3 3 0 005 0" stroke-width="1.4"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">LavanderPro</span>
        <span class="brand-tag">Industrial</span>
      </div>
    </div>

    <h1 class="auth-title" data-od-id="login-title">Iniciar sesión</h1>
    <p class="auth-subtitle" data-od-id="login-subtitle">Accede al panel de control de tu lavandería.</p>

    <div class="alert alert-error" id="loginAlert" role="alert" aria-live="assertive" data-od-id="login-alert">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5v3.5M8 11v.5"/></svg>
      <span id="loginAlertText"></span>
    </div>

    <form class="auth-form" id="loginForm" novalidate data-od-id="login-form">
      <div class="input-group" data-od-id="login-email-group">
        <label class="input-label" for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input-field"
          placeholder="tu@email.com"
          autocomplete="email"
          required
          data-od-id="login-email"
        >
      </div>

      <div class="input-group" data-od-id="login-password-group">
        <label class="input-label" for="password">Contraseña</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            data-od-id="login-password"
          >
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Mostrar contraseña" data-od-id="login-toggle-password">
            <svg id="eyeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8s-2.5 4.5-6.5 4.5S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2.5"/></svg>
            <svg id="eyeOffIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><path d="M2 14L14 2M4.5 11.5s1.5 1.5 3.5 1.5 4.5-2 5.5-5c-.5-1.5-1.5-2.5-2.5-3.25"/><path d="M6.5 3.5c.75-.25 1.5-.25 2.25 0"/></svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-wrap">
          <input type="checkbox" id="remember" name="remember">
          <span>Recordarme</span>
        </label>
        <a href="#" class="text-link">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn" data-od-id="login-submit">
        <span id="btnText">Iniciar sesión</span>
      </button>
    </form>

    <div class="auth-footer" data-od-id="login-footer">
      ¿No tienes cuenta? <a href="register.html" class="text-link">Crear cuenta</a>
    </div>
  </div>
</div>

<script>
  (function() {
    var form = document.getElementById('loginForm');
    var email = document.getElementById('email');
    var password = document.getElementById('password');
    var toggle = document.getElementById('togglePassword');
    var eyeIcon = document.getElementById('eyeIcon');
    var eyeOffIcon = document.getElementById('eyeOffIcon');
    var submitBtn = document.getElementById('submitBtn');
    var btnText = document.getElementById('btnText');
    var alertBox = document.getElementById('loginAlert');
    var alertText = document.getElementById('loginAlertText');

    function showAlert(msg, type) {
      alertBox.className = 'alert alert-' + type + ' show';
      alertText.textContent = msg;
    }
    function hideAlert() {
      alertBox.className = 'alert';
      alertText.textContent = '';
    }

    function setError(input, hasError) {
      if (hasError) input.classList.add('error');
      else input.classList.remove('error');
    }

    toggle.addEventListener('click', function() {
      var isHidden = password.type === 'password';
      password.type = isHidden ? 'text' : 'password';
      eyeIcon.style.display = isHidden ? 'none' : 'block';
      eyeOffIcon.style.display = isHidden ? 'block' : 'none';
      toggle.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      hideAlert();
      setError(email, false);
      setError(password, false);

      var emailVal = email.value.trim();
      var passwordVal = password.value;
      var hasError = false;

      if (!emailVal) {
        setError(email, true);
        showAlert('Ingresa tu correo electrónico.', 'error');
        email.focus();
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
        setError(email, true);
        showAlert('Ingresa un correo electrónico válido.', 'error');
        email.focus();
        hasError = true;
      } else if (!passwordVal) {
        setError(password, true);
        showAlert('Ingresa tu contraseña.', 'error');
        password.focus();
        hasError = true;
      }

      if (hasError) return;

      submitBtn.disabled = true;
      btnText.textContent = 'Iniciando sesión…';
      var spinner = document.createElement('span');
      spinner.className = 'spinner';
      spinner.setAttribute('aria-hidden', 'true');
      submitBtn.appendChild(spinner);

      setTimeout(function() {
        spinner.remove();
        submitBtn.disabled = false;
        btnText.textContent = 'Iniciar sesión';
        showAlert('Sesión iniciada correctamente. Redirigiendo…', 'success');
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 800);
      }, 1200);
    });
  })();
</script>

</body>
</html>
